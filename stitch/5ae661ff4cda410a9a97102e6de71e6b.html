<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smoke Ritim - Ana Ekran</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffeefb",
                    "on-primary-container": "#002150",
                    "secondary-fixed": "#65e1ff",
                    "surface-bright": "#eff8fe",
                    "surface-container": "#dfeaf1",
                    "tertiary-dim": "#7b2f85",
                    "tertiary-fixed-dim": "#e28ce9",
                    "surface-variant": "#d1dfe7",
                    "primary": "#0057bd",
                    "error": "#b31b25",
                    "primary-fixed": "#6e9fff",
                    "tertiary": "#893c92",
                    "error-dim": "#9f0519",
                    "tertiary-container": "#f199f7",
                    "on-secondary-fixed": "#003a45",
                    "secondary": "#006576",
                    "primary-fixed-dim": "#5391ff",
                    "inverse-surface": "#070f13",
                    "on-background": "#273034",
                    "primary-container": "#6e9fff",
                    "on-tertiary-fixed-variant": "#681c73",
                    "background": "#eff8fe",
                    "on-tertiary-fixed": "#3e0047",
                    "on-primary-fixed": "#000000",
                    "error-container": "#fb5151",
                    "secondary-dim": "#005867",
                    "outline-variant": "#a5aeb4",
                    "primary-dim": "#004ca6",
                    "on-error": "#ffefee",
                    "outline": "#6f787d",
                    "tertiary-fixed": "#f199f7",
                    "surface": "#eff8fe",
                    "surface-container-highest": "#d1dfe7",
                    "on-surface": "#273034",
                    "on-tertiary-container": "#5e106a",
                    "inverse-on-surface": "#959ea4",
                    "on-secondary-fixed-variant": "#005969",
                    "surface-tint": "#0057bd",
                    "surface-container-low": "#e8f2f9",
                    "surface-container-high": "#d8e4ec",
                    "secondary-container": "#65e1ff",
                    "on-secondary-container": "#004f5d",
                    "on-surface-variant": "#545d62",
                    "surface-dim": "#c8d7df",
                    "on-error-container": "#570008",
                    "secondary-fixed-dim": "#48d4f3",
                    "on-primary-fixed-variant": "#002a62",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#4d8eff",
                    "on-secondary": "#def7ff",
                    "on-primary": "#f0f2ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "display": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#eff8fe]/80 dark:bg-slate-950/80 backdrop-blur-xl docked full-width top-0 rounded-b-[3rem] flat no shadows flex justify-between items-center w-full px-8 py-6 z-40 relative">
<div class="text-2xl font-black italic text-[#0057bd] dark:text-[#6e9fff] font-['Inter'] tracking-tight">
            Smoke Ritim
        </div>
<div class="flex items-center space-x-4">
<button class="text-[#0057bd] dark:text-[#6e9fff] hover:bg-[#e8f2f9] dark:hover:bg-slate-800 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="max-w-4xl mx-auto px-6 pt-12 space-y-16">
<!-- Hero Encouragement -->
<section class="space-y-4 text-center">
<h1 class="text-[2rem] font-extrabold text-primary tracking-tight">Harika Gidiyorsun!</h1>
<p class="text-[0.875rem] text-on-surface-variant font-medium">Bugün ritmi yakaladın mı? Hadi bir adım daha atalım.</p>
</section>
<!-- Add Habit Input -->
<section class="relative max-w-2xl mx-auto">
<div class="bg-surface-container-lowest rounded-xl p-2 flex items-center shadow-[0px_0px_32px_rgba(0,87,189,0.06)] relative overflow-hidden group">
<!-- Decorative Ghost Border -->
<div class="absolute inset-0 border border-outline-variant opacity-10 rounded-xl pointer-events-none"></div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface text-[1rem] px-4 font-medium placeholder:text-outline" placeholder="Yeni Alışkanlık Ekle..." type="text"/>
<button class="bg-gradient-to-br from-primary to-primary-container text-white p-4 rounded-xl shadow-md transition-transform hover:scale-105 active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
</div>
</section>
<!-- Habits Grid (Intentional Asymmetry) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
<!-- Active/Completed Habit Card -->
<article class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_0px_32px_rgba(0,87,189,0.06)] relative flex flex-col justify-between min-h-[280px] overflow-hidden group">
<div class="absolute inset-0 border border-outline-variant opacity-10 rounded-xl pointer-events-none"></div>
<div class="flex justify-between items-start z-10 relative">
<div class="bg-secondary-container text-on-secondary-container px-4 py-1 rounded-lg text-[0.875rem] font-bold uppercase tracking-wider inline-flex items-center space-x-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Tamamlandı</span>
</div>
<button class="text-outline hover:text-error transition-colors p-2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<div class="z-10 relative mt-8">
<h3 class="text-[2rem] font-extrabold text-on-surface leading-tight mb-2">Bugün sigara içmedim</h3>
<div class="flex items-baseline space-x-2 mt-4">
<span class="text-[3.5rem] font-black text-primary leading-none tracking-tighter">12</span>
<span class="text-[1.5rem] font-bold text-primary-dim">Gün</span>
</div>
<!-- Bubble Stream Progress -->
<div class="flex space-x-1.5 mt-6">
<div class="w-2 h-2 rounded-full bg-secondary-fixed opacity-40"></div>
<div class="w-2.5 h-2.5 rounded-full bg-secondary-fixed opacity-60"></div>
<div class="w-3 h-3 rounded-full bg-secondary-fixed opacity-80"></div>
<div class="w-3.5 h-3.5 rounded-full bg-secondary-fixed"></div>
</div>
</div>
</article>
<!-- Pending Habit Card -->
<article class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_0px_32px_rgba(0,87,189,0.06)] relative flex flex-col justify-between min-h-[280px] mt-4 md:mt-12 overflow-hidden group">
<div class="absolute inset-0 border border-outline-variant opacity-10 rounded-xl pointer-events-none"></div>
<div class="flex justify-between items-start z-10 relative">
<div class="bg-surface-container-high text-on-surface-variant px-4 py-1 rounded-lg text-[0.875rem] font-bold uppercase tracking-wider inline-flex items-center space-x-2">
<span class="material-symbols-outlined text-sm">water_drop</span>
<span>Bekliyor</span>
</div>
<button class="text-outline hover:text-error transition-colors p-2 opacity-0 group-hover:opacity-100">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<div class="z-10 relative mt-8 flex-1 flex flex-col justify-end">
<h3 class="text-[1.5rem] font-bold text-on-surface leading-tight mb-2">2 Litre Su İç</h3>
<div class="flex items-baseline space-x-2 mt-2 mb-6 opacity-60">
<span class="text-[2rem] font-black text-primary leading-none tracking-tighter">0</span>
<span class="text-[1rem] font-bold text-primary-dim">Gün</span>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-xl text-[0.875rem] font-bold uppercase tracking-wider shadow-md hover:opacity-90 transition-opacity flex justify-center items-center space-x-2">
<span>Tamamla</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">task_alt</span>
</button>
</div>
</article>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-white/70 dark:bg-slate-900/70 backdrop-blur-[20px] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 z-50 rounded-t-[3rem] shadow-[0px_0px_32px_rgba(0,87,189,0.06)] font-['Inter'] text-[12px] font-bold uppercase tracking-wider">
<button class="flex flex-col items-center justify-center bg-[#65e1ff] dark:bg-[#0057bd] text-[#273034] dark:text-white rounded-[2rem] px-6 py-2 scale-110 transition-transform">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">event_upcoming</span>
            Bugün
        </button>
<button class="flex flex-col items-center justify-center text-[#a5aeb4] p-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1">auto_awesome</span>
            Ritmi
        </button>
<button class="flex flex-col items-center justify-center text-[#a5aeb4] p-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1">insert_chart</span>
            İstatistik
        </button>
<button class="flex flex-col items-center justify-center text-[#a5aeb4] p-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1">settings</span>
            Ayarlar
        </button>
</nav>
<!-- Floating Action Button (FAB) - For larger screens -->
<button class="hidden md:flex fixed bottom-8 right-8 bg-gradient-to-br from-primary to-primary-container text-white p-5 rounded-full shadow-[0px_0px_32px_rgba(0,87,189,0.3)] hover:scale-105 active:scale-95 transition-all z-50 items-center justify-center">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
</body></html>
