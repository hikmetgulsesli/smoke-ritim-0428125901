<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smoke Ritim - Bir Sorun Oluştu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {

        theme: {
          extend: {

                    "on-primary-container": "#002150",
                    "secondary-fixed": "#65e1ff",
                    "surface-bright": "#eff8fe",

                    "primary": "#0057bd",
                    "error": "#b31b25",
                    "primary-fixed": "#6e9fff",
                    "tertiary": "#893c92",
                    "error-dim": "#9f0519",
                    "tertiary-container": "#f199f7",
                    "on-secondary-fixed": "#003a45",
                    "secondary": "#006576",
                    "primary-fixed-dim": "#5391ff",
                    "inverse-surface": "#070f13",
                    "on-background": "#273034",

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 bg-background relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-error/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Error Card -->
<main class="w-full max-w-lg bg-surface-container-lowest rounded-xl p-10 md:p-14 flex flex-col items-center text-center z-10">
<!-- Icon Container -->
<div class="w-24 h-24 rounded-full bg-error-container/10 flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-[48px] text-error" data-icon="error" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                error
            </span>
</div>
<!-- Typography -->
<h1 class="text-headline-lg text-on-surface mb-4 tracking-tight">Bir Sorun Oluştu</h1>
<p class="text-body-md text-on-surface-variant mb-10 max-w-sm leading-relaxed">
            Verileriniz kaydedilemedi. Lütfen tarayıcı ayarlarınızı kontrol edin veya sayfayı yenileyin.
        </p>
<!-- Actions -->
<button class="w-full sm:w-auto px-10 py-5 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary text-label-md uppercase tracking-wider flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-[20px]" data-icon="refresh">
                refresh
            </span>
            Tekrar Dene
        </button>
</main>
